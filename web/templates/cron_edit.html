{{define "content"}}
<div class="flex gap-2 mb-4">
  <a href="/crons/{{.Content.ID}}" class="btn">&lt; back</a>
</div>

<div class="card">
  <div class="card-header">Edit Cron Job</div>
  <div class="card-body">
    <form method="POST" action="/crons/{{.Content.ID}}">
      <div class="form-group">
        <label class="form-label">Name</label>
        <input type="text" name="name" class="form-input" required value="{{.Content.Name}}">
      </div>

      <div class="form-group">
        <label class="form-label">Description</label>
        <input type="text" name="description" class="form-input" value="{{.Content.Description}}">
      </div>

      <div class="form-group">
        <label class="form-label">Schedule (cron with seconds)</label>
        <input type="text" name="schedule" class="form-input" required value="{{.Content.Schedule}}">
      </div>

      <div class="form-group">
        <label class="form-label">Prompt</label>
        <textarea name="prompt" class="form-textarea" required>{{.Content.Prompt}}</textarea>
      </div>

      <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px;">
        <div class="form-group">
          <label class="form-label">Model</label>
          <select name="model" class="form-select">
            <option value="sonnet"{{if eq .Content.Model "sonnet"}} selected{{end}}>sonnet</option>
            <option value="opus"{{if eq .Content.Model "opus"}} selected{{end}}>opus</option>
            <option value="haiku"{{if eq .Content.Model "haiku"}} selected{{end}}>haiku</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label">Max Budget (USD)</label>
          <input type="number" name="max_budget_usd" class="form-input" value="{{printf "%.2f" .Content.MaxBudget}}" step="0.10" min="0.10">
        </div>

        <div class="form-group">
          <label class="form-label">Timeout (seconds)</label>
          <input type="number" name="timeout_seconds" class="form-input" value="{{.Content.Timeout}}" min="30">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Working Directory</label>
        <input type="text" name="working_dir" class="form-input" required value="{{.Content.WorkingDir}}">
      </div>

      <button type="submit" class="btn btn-primary">save changes</button>
    </form>
  </div>
</div>
{{end}}
