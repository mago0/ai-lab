{{define "layout.html"}}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.Title}} - ai-lab</title>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <script src="https://unpkg.com/htmx-ext-sse@2.2.2/sse.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a0a0c;
      --bg-secondary: #111114;
      --bg-tertiary: #1a1a1f;
      --bg-hover: #22222a;
      --border: #2a2a33;
      --border-bright: #3a3a44;
      --text-primary: #e8e8ed;
      --text-secondary: #8888a0;
      --text-muted: #555566;
      --accent-cyan: #00d4ff;
      --accent-green: #22cc88;
      --accent-amber: #ffaa22;
      --accent-red: #ff4455;
      --accent-violet: #8866ff;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'DM Sans', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--mono);
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
    }

    /* Sidebar */
    .sidebar {
      width: 220px;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      z-index: 10;
    }

    .sidebar-brand {
      padding: 20px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent-cyan);
    }

    .sidebar-brand span {
      color: var(--text-muted);
      font-weight: 300;
    }

    .sidebar-nav {
      padding: 8px 0;
      flex: 1;
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.04em;
      transition: all 0.15s;
      border-left: 2px solid transparent;
    }

    .nav-link:hover {
      color: var(--text-primary);
      background: var(--bg-hover);
      border-left-color: var(--border-bright);
    }

    .nav-link.active {
      color: var(--accent-cyan);
      background: rgba(0, 212, 255, 0.04);
      border-left-color: var(--accent-cyan);
    }

    .nav-icon {
      width: 16px;
      text-align: center;
      font-size: 11px;
      opacity: 0.7;
    }

    .sidebar-footer {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.06em;
    }

    .status-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      margin-right: 6px;
    }

    .status-dot.online { background: var(--accent-green); box-shadow: 0 0 6px var(--accent-green); }
    .status-dot.offline { background: var(--accent-red); }

    /* Main content */
    .main {
      margin-left: 220px;
      flex: 1;
      min-height: 100vh;
    }

    .topbar {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--bg-secondary);
    }

    .topbar h1 {
      font-family: var(--sans);
      font-size: 16px;
      font-weight: 500;
      color: var(--text-primary);
    }

    .topbar-meta {
      font-size: 11px;
      color: var(--text-muted);
    }

    .content {
      padding: 24px;
    }

    /* Cards */
    .card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
    }

    .card-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-secondary);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .card-body { padding: 16px; }

    /* Stats grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 16px;
    }

    .stat-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 300;
      color: var(--text-primary);
      line-height: 1;
    }

    .stat-value.cyan { color: var(--accent-cyan); }
    .stat-value.green { color: var(--accent-green); }
    .stat-value.amber { color: var(--accent-amber); }

    /* Tables */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    th {
      text-align: left;
      padding: 10px 16px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      background: var(--bg-tertiary);
    }

    td {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      color: var(--text-secondary);
    }

    tr:hover td { background: var(--bg-hover); }

    /* Badges */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 2px;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .badge-success { background: rgba(34, 204, 136, 0.12); color: var(--accent-green); border: 1px solid rgba(34, 204, 136, 0.25); }
    .badge-error { background: rgba(255, 68, 85, 0.12); color: var(--accent-red); border: 1px solid rgba(255, 68, 85, 0.25); }
    .badge-warn { background: rgba(255, 170, 34, 0.12); color: var(--accent-amber); border: 1px solid rgba(255, 170, 34, 0.25); }
    .badge-info { background: rgba(0, 212, 255, 0.12); color: var(--accent-cyan); border: 1px solid rgba(0, 212, 255, 0.25); }
    .badge-muted { background: var(--bg-tertiary); color: var(--text-muted); border: 1px solid var(--border); }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border: 1px solid var(--border);
      border-radius: 3px;
      background: var(--bg-tertiary);
      color: var(--text-secondary);
      font-family: var(--mono);
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s;
      text-decoration: none;
    }

    .btn:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
      border-color: var(--border-bright);
    }

    .btn-primary {
      background: rgba(0, 212, 255, 0.1);
      border-color: rgba(0, 212, 255, 0.3);
      color: var(--accent-cyan);
    }

    .btn-primary:hover {
      background: rgba(0, 212, 255, 0.18);
    }

    .btn-danger {
      background: rgba(255, 68, 85, 0.08);
      border-color: rgba(255, 68, 85, 0.25);
      color: var(--accent-red);
    }

    /* Forms */
    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .form-input, .form-select, .form-textarea {
      width: 100%;
      padding: 8px 12px;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text-primary);
      font-family: var(--mono);
      font-size: 12px;
      transition: border-color 0.15s;
    }

    .form-input:focus, .form-select:focus, .form-textarea:focus {
      outline: none;
      border-color: var(--accent-cyan);
    }

    .form-textarea {
      min-height: 200px;
      resize: vertical;
      line-height: 1.6;
    }

    /* Activity feed */
    .feed-item {
      display: flex;
      gap: 12px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      transition: background 0.1s;
    }

    .feed-item:hover { background: var(--bg-hover); }

    .feed-time {
      color: var(--text-muted);
      font-size: 10px;
      white-space: nowrap;
      min-width: 70px;
    }

    .feed-source {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      min-width: 60px;
    }

    .feed-source.discord { color: var(--accent-violet); }
    .feed-source.cron { color: var(--accent-amber); }
    .feed-source.system { color: var(--text-muted); }
    .feed-source.dashboard { color: var(--accent-cyan); }

    .feed-text { color: var(--text-secondary); flex: 1; }

    /* Messages */
    .message {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }

    .message-header {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 6px;
    }

    .message-role {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 600;
    }

    .message-role.user { color: var(--accent-cyan); }
    .message-role.assistant { color: var(--accent-green); }

    .message-time {
      font-size: 10px;
      color: var(--text-muted);
    }

    .message-content {
      font-size: 13px;
      line-height: 1.6;
      color: var(--text-secondary);
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* Utility */
    .mt-4 { margin-top: 16px; }
    .mb-4 { margin-bottom: 16px; }
    .flex { display: flex; }
    .gap-2 { gap: 8px; }
    .gap-4 { gap: 16px; }
    .items-center { align-items: center; }
    .justify-between { justify-content: space-between; }
    .text-muted { color: var(--text-muted); }
    .text-sm { font-size: 11px; }

    /* Scanline effect for flair */
    .main::before {
      content: '';
      position: fixed;
      top: 0;
      left: 220px;
      right: 0;
      bottom: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.015) 2px,
        rgba(0, 0, 0, 0.015) 4px
      );
      z-index: 1000;
    }
  </style>
</head>
<body>
  <nav class="sidebar">
    <div class="sidebar-brand">ai-lab <span>/ ctrl</span></div>
    <div class="sidebar-nav">
      <a href="/" class="nav-link"><span class="nav-icon">&gt;</span> dashboard</a>
      <a href="/messages" class="nav-link"><span class="nav-icon">#</span> messages</a>
      <a href="/crons" class="nav-link"><span class="nav-icon">@</span> cron jobs</a>
      <a href="/soul" class="nav-link"><span class="nav-icon">~</span> soul.md</a>
    </div>
    <div class="sidebar-footer">
      <span class="status-dot online"></span>system online
    </div>
  </nav>

  <div class="main">
    <div class="topbar">
      <h1>{{.Title}}</h1>
      <span class="topbar-meta" id="clock"></span>
    </div>
    <div class="content">
      {{template "content" .}}
    </div>
  </div>

  <script>
    function updateClock() {
      const now = new Date();
      document.getElementById('clock').textContent = now.toLocaleTimeString('en-US', {hour12: false}) + ' UTC' + (now.getTimezoneOffset() > 0 ? '-' : '+') + Math.abs(now.getTimezoneOffset()/60);
    }
    updateClock();
    setInterval(updateClock, 1000);

    // Highlight active nav link
    document.querySelectorAll('.nav-link').forEach(link => {
      if (link.pathname === window.location.pathname) link.classList.add('active');
    });
  </script>
</body>
</html>{{end}}
